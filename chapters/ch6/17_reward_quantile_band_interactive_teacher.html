<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reward Distribution — Interactive</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:        #FAF6F0;
  --bg2:       #F0E8DC;
  --bg3:       #E8DDD2;
  --border:    #D8CABD;
  --text:      #463F3A;
  --muted:     #6B625B;
  --faint:     #9B8E82;
  --goal:      #87986A;
  --collision: #A44A3F;
  --timeout:   #C98245;
  --primary:   #7D9D9C;
  --band-outer: rgba(125,157,156,0.10);
  --band-inner: rgba(125,157,156,0.24);
  --grid:      #E8DDD2;
  --font:      'DM Sans', -apple-system, sans-serif;
  --mono:      'DM Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: var(--font);
  color: var(--text);
  font-size: 13px;
}

/* ── layout ──────────────────────────────────────────── */
#app {
  display: flex; flex-direction: column;
  height: 100vh; padding: 12px; gap: 10px;
}
#main-row {
  display: flex; flex: 1; gap: 10px; min-height: 0;
}
#left {
  flex: 1; min-width: 0; position: relative;
  display: flex; flex-direction: column;
}
#plot-title {
  font-size: 13px; font-weight: 500;
  color: var(--muted); letter-spacing: .03em;
  padding: 0 4px 6px;
}
#main-plot { flex: 1; min-height: 0; position: relative; }
#reveal-mask {
  position: absolute;
  background: var(--bg);
  border-left: 2px solid var(--primary);
  box-shadow: 0 0 8px 0 rgba(125,157,156,0.45);
  pointer-events: auto;
  z-index: 5;
}

/* ── right panel ─────────────────────────────────────── */
#right {
  width: 200px; display: flex; flex-direction: column; gap: 8px;
}
.tile {
  background: var(--bg2);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 11px 14px;
}
.tile-lbl {
  font-size: 10px; font-weight: 500;
  color: var(--faint);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.tile-val {
  font-size: 27px; font-weight: 500;
  line-height: 1.1;
  color: var(--text);
  font-family: var(--mono);
  transition: color .18s ease;
}
#tile-pie {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
}
#pie-wrap {
  flex: 1; min-height: 120px;
  position: relative;
}

/* ── controls bar ────────────────────────────────────── */
#controls {
  display: flex; align-items: center;
  gap: 8px; flex-shrink: 0;
  padding: 2px 0;
}
.ctrl-btn {
  background: transparent;
  border: 0.5px solid var(--border);
  border-radius: 6px;
  padding: 4px 11px;
  font-size: 12px; font-family: var(--font);
  color: var(--text); cursor: pointer;
  white-space: nowrap;
  transition: background .12s;
}
.ctrl-btn:hover { background: var(--bg2); }
.ctrl-btn:active { background: var(--bg3); }

#pb-wrap {
  flex: 1; height: 5px;
  background: var(--border);
  border-radius: 3px;
  cursor: pointer; position: relative;
}
#pb {
  height: 100%; background: var(--primary);
  border-radius: 3px; width: 0%;
  pointer-events: none;
  transition: width .04s linear;
}
#pb-thumb {
  position: absolute; top: 50%; right: calc(100% - 100%);
  width: 10px; height: 10px;
  background: var(--primary);
  border-radius: 50%; transform: translateY(-50%);
  transition: opacity .2s; opacity: 0;
  pointer-events: none;
}
#pb-wrap:hover #pb-thumb { opacity: 1; }
#spd-lbl {
  font-size: 11px; color: var(--muted);
  min-width: 30px; text-align: center;
  font-family: var(--mono);
}

/* ── legend key (bands) ──────────────────────────────── */
#band-key {
  display: flex; align-items: center; gap: 14px;
  padding: 0 4px 4px; font-size: 10.5px; color: var(--muted);
}
.key-item { display: flex; align-items: center; gap: 5px; }
.key-swatch {
  width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
}
.key-line {
  width: 14px; height: 2px; border-radius: 1px; flex-shrink: 0;
}

/* ── hover badge ─────────────────────────────────────── */
#hover-badge {
  position: absolute; bottom: 8px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg2); border: 0.5px solid var(--border);
  border-radius: 20px; padding: 4px 14px;
  font-size: 11px; color: var(--muted);
  opacity: 0; transition: opacity .4s;
  pointer-events: none; white-space: nowrap;
}
#hover-badge.show { opacity: 1; }

/* ── episode counter overlay ─────────────────────────── */
#ep-counter {
  position: absolute; top: 8px; right: 8px;
  font-size: 10px; font-family: var(--mono);
  color: var(--faint); pointer-events: none;
}
</style>
</head>
<body>
<div id="app">
  <div id="band-key">
    <div class="key-item"><span class="key-swatch" style="background:var(--band-outer);border:0.5px solid var(--border);"></span>10–90%</div>

    <div class="key-item"><span class="key-line" style="background:var(--primary);"></span>Median</div>
    <div class="key-item"><span class="key-swatch" style="background:var(--faint);opacity:.4;border-radius:50%;width:6px;height:6px;"></span>Episode reward</div>
  </div>
  <div id="main-row">

    <!-- LEFT: main plot -->
    <div id="left">
      <div id="plot-title">Reward Distribution Over Training</div>
      <div id="main-plot"></div>

      <div id="ep-counter"></div>

    <!-- RIGHT: 3 tiles + pie -->

      </div>
      <div class="tile">

      </div>
      <div class="tile">

      <div class="tile" id="tile-pie">

      </div>
    </div>

  </div>

  <!-- CONTROLS -->
  <div id="controls">

    <div id="pb-wrap">

  </div>
</div>

function reasonLabel(r) {
  if (r === 'goal') return 'Goal';
  if (r === 'collision') return 'Collision';
  if (r === 'timeout') return 'Timeout';
  return 'Unknown';
}

/* ── build full trace data + stage shapes/annotations up front ──────────────
   Everything is rendered ONCE, in full. Progressive reveal is done with a
   DOM overlay (see "reveal mask" below) instead of repeatedly mutating the
   Plotly figure — this is what makes the animation run at a smooth,
   consistent frame rate regardless of how many episodes there are. */
function buildFullTraceData() {
  const raw = { x: [], y: [], text: [] };
  const q90 = { x: [], y: [] }, q10 = { x: [], y: [] };
  const q75 = { x: [], y: [] }, q25 = { x: [], y: [] };
  const med = { x: [], y: [] };

  for (let i = 0; i < TOTAL; i++) {
    const ep = D.episodes[i];
    const rw = D.rewards[i];
    if (rw !== null) {
      raw.x.push(ep); raw.y.push(rw);
      raw.text.push(reasonLabel(D.reasons[i] || 'unknown'));
    }
    if (D.q50[i] !== null) {
      q90.x.push(ep); q90.y.push(D.q90[i]);
      q10.x.push(ep); q10.y.push(D.q10[i]);
      q75.x.push(ep); q75.y.push(D.q75[i]);
      q25.x.push(ep); q25.y.push(D.q25[i]);
      med.x.push(ep); med.y.push(D.q50[i]);
    }
  }
  return { raw, q90, q10, q75, q25, med };
}

function buildAllShapesAnnotations() {
  const shapes = [], annots = [];
  for (const zone of D.stageZones) {
    if (zone.ep !== null) {
      shapes.push({
        type: 'line', x0: zone.ep, x1: zone.ep, y0: 0, y1: 1, yref: 'paper',
        line: { color: '#9B8E82', width: 1.1, dash: 'dash' },
      });
    }
    annots.push({
      x: zone.center, y: 1.025, xref: 'x', yref: 'paper',
      text: zone.label, showarrow: false,
      font: { size: 11, color: '#6B625B', family: "'DM Sans', sans-serif" },
      bgcolor: '#FAF6F0', borderpad: 2,
    });
  }
  return { shapes, annots };
}

  },
  {  /* 1: q90 (outer band upper) */
    name: 'q90', x: FULL.q90.x, y: FULL.q90.y,
    mode: 'lines', type: 'scatter',
    line: { width: 0, color: 'rgba(125,157,156,0)' },
    hoverinfo: 'skip',
  },
  {  /* 2: q10 (outer band lower, fills to q90) */
    name: '10–90% band', x: FULL.q10.x, y: FULL.q10.y,
    mode: 'lines', type: 'scatter',
    line: { width: 0, color: 'rgba(125,157,156,0)' },
    fill: 'tonexty', fillcolor: 'rgba(125,157,156,0.10)',
    hoverinfo: 'skip',
  },
  {  /* 3: q75 (inner band upper) */
    name: 'q75', x: FULL.q75.x, y: FULL.q75.y,
    mode: 'lines', type: 'scatter',
    line: { width: 0, color: 'rgba(125,157,156,0)' },
    hoverinfo: 'skip',
  },
  {  /* 4: q25 (inner band lower, fills to q75) */
    name: '25–75% band', x: FULL.q25.x, y: FULL.q25.y,
    mode: 'lines', type: 'scatter',
    line: { width: 0, color: 'rgba(125,157,156,0)' },
    fill: 'tonexty', fillcolor: 'rgba(125,157,156,0.24)',
    hoverinfo: 'skip',
  },
  {  /* 5: rolling median */
    name: `Median (w=${D.rollingWindow})`,
    x: FULL.med.x, y: FULL.med.y,
    mode: 'lines', type: 'scatter',
    line: { color: '#7D9D9C', width: 2.6 },
    hovertemplate: 'Ep <b>%{x}</b><br>Median: %{y:.2f}<extra></extra>',
  },
];

/* ── init pie chart ──────────────────────────────────────────────────────── */
const PIE_LAYOUT = {
  paper_bgcolor: 'transparent', plot_bgcolor: 'transparent',
  margin: { t: 4, r: 4, b: 4, l: 4 },
  showlegend: false,
};

Plotly.newPlot('pie-wrap', [{
  type: 'pie',
  values: [1, 1, 1],
  labels: ['Goal', 'Collision', 'Timeout'],
  marker: { colors: ['#87986A', '#A44A3F', '#C98245'] },
  hole: 0.44,
  textinfo: 'percent',
  textfont: { size: 10, color: '#463F3A', family: "'DM Sans', sans-serif" },
  sort: false, direction: 'clockwise',
  hovertemplate: '%{label}: %{value} eps (%{percent})<extra></extra>',
}], PIE_LAYOUT, { displayModeBar: false, responsive: true });

/* ── DOM helpers ─────────────────────────────────────────────────────────── */
function fmt(v, dec) {
  if (v === null || v === undefined) return '—';
  const n = Number(v);
  if (!isFinite(n)) return '—';
  return n.toFixed(dec !== undefined ? dec : 1);
}

function updateTiles(i) {
  const r      = D.rewards[i];
  const reason = D.reasons[i] || 'unknown';
  const md     = D.q50[i];
  const ep     = D.episodes[i];

  document.getElementById('v-ep').textContent  = ep.toLocaleString();
  document.getElementById('v-md').textContent  = fmt(md, 2);

  const rwEl = document.getElementById('v-rw');
  rwEl.textContent  = fmt(r, 1);
  rwEl.style.color  = COLORS[reason] || COLORS.unknown;

  document.getElementById('ep-counter').textContent = `${i + 1} / ${TOTAL}`;
}

function updatePie() {
  const g = pieCounts.goal      || 0;
  const c = pieCounts.collision || 0;
  const t = pieCounts.timeout   || 0;
  if (g + c + t === 0) return;
  Plotly.react('pie-wrap', [{
    type: 'pie',
    values: [g, c, t],
    labels: ['Goal', 'Collision', 'Timeout'],
    marker: { colors: ['#87986A', '#A44A3F', '#C98245'] },
    hole: 0.44, textinfo: 'percent',
    textfont: { size: 10, color: '#463F3A', family: "'DM Sans', sans-serif" },
    sort: false, direction: 'clockwise',
    hovertemplate: '%{label}: %{value} eps (%{percent})<extra></extra>',
  }], PIE_LAYOUT, { displayModeBar: false, responsive: true });
}

/* advance the running outcome tally up to (and including) idx — amortized
   O(1) per call since it only walks the episodes not yet counted */
function advancePieCounts(idx) {
  for (let i = pieCountedUpTo + 1; i <= idx; i++) {
    const r = D.reasons[i] || 'unknown';
    pieCounts[r] = (pieCounts[r] || 0) + 1;
  }
  pieCountedUpTo = idx;
}

function resetPieCounts() {
  pieCounts = { goal: 0, collision: 0, timeout: 0 };
  pieCountedUpTo = -1;
}

/* ── reveal mask ──────────────────────────────────────────────────────────
   A plain DOM div, positioned exactly over Plotly's inner plotting
   rectangle, that shrinks from left→right as revealFrac grows. Moving a
   div is compositor-only (no layout/paint of the chart itself), so this
   stays smooth at 60fps no matter how large the dataset is. */
let plotGd   = null;
let maskEl   = null;
let plotGeom = { left: 0, top: 0, width: 0, height: 0 };

function updatePlotGeom() {
  if (!plotGd || !plotGd._fullLayout) return;
  const xa = plotGd._fullLayout.xaxis;
  const ya = plotGd._fullLayout.yaxis;
  plotGeom = { left: xa._offset, width: xa._length, top: ya._offset, height: ya._length };
}

function positionMask() {
  if (!maskEl) return;
  const revealPx = plotGeom.width * revealFrac;
  maskEl.style.left   = (plotGeom.left + revealPx) + 'px';
  maskEl.style.top    = plotGeom.top + 'px';
  maskEl.style.width  = Math.max(0, plotGeom.width - revealPx) + 'px';
  maskEl.style.height = plotGeom.height + 'px';
  maskEl.style.display = revealFrac >= 1 ? 'none' : 'block';
}

function createMask() {
  maskEl = document.createElement('div');
  maskEl.id = 'reveal-mask';
  document.getElementById('main-plot').appendChild(maskEl);
  updatePlotGeom();
  positionMask();
}

/* keep the mask aligned if the window/container is resized */
new ResizeObserver(() => { updatePlotGeom(); positionMask(); })
  .observe(document.getElementById('main-plot'));

/* ── animation ───────────────────────────────────────────────────────────── */
function frameToIdx(frac) {
  return Math.min(TOTAL - 1, Math.max(0, Math.floor(frac * (TOTAL - 1))));
}

function animStep(ts) {
  if (!playing) return;
  if (!startTime) startTime = ts;

  const dur = ANIM_MS / SPEEDS[speedIdx];
  revealFrac = Math.min(1, (ts - startTime) / dur);
  positionMask();

  const idx = frameToIdx(revealFrac);
  if (idx !== frame) {
    frame = idx;
    updateTiles(frame);
    advancePieCounts(frame);
    pieTick++;
    if (pieTick % PIE_FREQ === 0) updatePie();
  }

  const pct = revealFrac * 100;
  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('pb-thumb').style.left = `calc(${pct}% - 5px)`;

  if (revealFrac >= 1) {
    animDone = true;
    playing  = false;
    advancePieCounts(TOTAL - 1);
    updatePie();
    document.getElementById('btn-play').textContent = '▶ Play';
    document.getElementById('hover-badge').classList.add('show');
    return;
  }

  requestAnimationFrame(animStep);
}

/* ── hover ────────────────────────────────────────────────────────────────
   Bound once, up front — the reveal mask physically blocks the mouse from
   reaching not-yet-revealed points, so hover can't spoil the animation.
   We still ignore hover while actively playing so it doesn't fight with
   the animation's own tile/pie updates. */
function setupHover() {
  plotGd.on('plotly_hover', function(evt) {
    if (playing) return;
    const pt = evt.points[0];
    if (pt.curveNumber !== TR_RAW && pt.curveNumber !== TR_MED) return;
    const idx = D.episodes.findIndex(e => e === pt.x);
    if (idx < 0) return;

    const tmp = { goal: 0, collision: 0, timeout: 0 };
    for (let i = 0; i <= idx; i++) {
      const r = D.reasons[i] || 'unknown';
      tmp[r] = (tmp[r] || 0) + 1;
    }
    pieCounts = tmp;

    updateTiles(idx);
    updatePie();
  });
}

/* ── init main plot ──────────────────────────────────────────────────────── */
Plotly.newPlot('main-plot', BASE_TRACES, BASE_LAYOUT, {
  responsive: true, displaylogo: false,
  modeBarButtonsToRemove: ['lasso2d', 'select2d', 'autoScale2d'],
}).then(gd => {
  plotGd = gd;
  createMask();
  setupHover();
  requestAnimationFrame(animStep);
});

/* ── controls ────────────────────────────────────────────────────────────── */

document.getElementById('btn-play').addEventListener('click', () => {
  if (animDone) return;
  playing = !playing;
  document.getElementById('btn-play').textContent = playing ? '⏸ Pause' : '▶ Play';
  if (playing) {
    startTime = performance.now() - revealFrac * (ANIM_MS / SPEEDS[speedIdx]);
    requestAnimationFrame(animStep);
  }
});

document.getElementById('btn-slower').addEventListener('click', () => {
  if (speedIdx === 0) return;
  speedIdx--;
  document.getElementById('spd-lbl').textContent = SPEEDS[speedIdx] + '×';
  if (playing) startTime = performance.now() - revealFrac * (ANIM_MS / SPEEDS[speedIdx]);
});

document.getElementById('btn-faster').addEventListener('click', () => {
  if (speedIdx === SPEEDS.length - 1) return;
  speedIdx++;
  document.getElementById('spd-lbl').textContent = SPEEDS[speedIdx] + '×';
  if (playing) startTime = performance.now() - revealFrac * (ANIM_MS / SPEEDS[speedIdx]);
});

document.getElementById('btn-restart').addEventListener('click', () => {
  playing = false;
  animDone = false;
  frame = 0; startTime = null; revealFrac = 0;
  resetPieCounts();
  pieTick = 0;
  positionMask();

  document.getElementById('hover-badge').classList.remove('show');
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('pb').style.width = '0%';
  document.getElementById('pb-thumb').style.left = '-5px';

  Plotly.react('pie-wrap', [{
    type: 'pie', values: [1, 1, 1], labels: ['Goal', 'Collision', 'Timeout'],
    marker: { colors: ['#87986A', '#A44A3F', '#C98245'] },
    hole: 0.44, textinfo: 'percent',
    textfont: { size: 10, color: '#463F3A' },
    sort: false, direction: 'clockwise',
  }], PIE_LAYOUT, { displayModeBar: false, responsive: true });

  ['v-ep', 'v-rw', 'v-md'].forEach(id => {
    document.getElementById(id).textContent = '—';
    document.getElementById(id).style.color = '';
  });
  document.getElementById('ep-counter').textContent = '';

  setTimeout(() => {
    playing = true;
    requestAnimationFrame(animStep);
  }, 80);
});

document.getElementById('pb-wrap').addEventListener('click', function(e) {
  const pct       = Math.max(0, Math.min(1, e.offsetX / this.offsetWidth));
  const targetIdx = Math.round(pct * (TOTAL - 1));

  playing = false;
  document.getElementById('btn-play').textContent = '▶ Play';

  revealFrac = pct;
  frame = targetIdx;
  positionMask();
  resetPieCounts();
  advancePieCounts(targetIdx);
  updateTiles(targetIdx);
  updatePie();

  document.getElementById('pb').style.width = (pct * 100) + '%';
  document.getElementById('pb-thumb').style.left = `calc(${pct * 100}% - 5px)`;

  if (targetIdx >= TOTAL - 1) {
    animDone = true;
    document.getElementById('hover-badge').classList.add('show');
  } else {
    animDone = false;
    document.getElementById('hover-badge').classList.remove('show');
  }
});
</script>
</body>
</html>
