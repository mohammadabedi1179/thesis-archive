<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>نقشه‌راه — آرشیو تعاملی پایان‌نامه</title>
<meta name="description" content="آرشیو تعاملی زیرسیستم‌های پروژه ناوبری خودکار روتر با یادگیری تقویتی">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <header id="topbar">
    <button id="menuToggle" class="icon-btn" aria-label="باز و بسته کردن فهرست مسیر" aria-expanded="false" aria-controls="sidebar">
      <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
    </button>

    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 40 20" aria-hidden="true">
        <path d="M2 10 h8" stroke-dasharray="3 3"/>
        <circle cx="12" cy="10" r="3.4"/>
        <path d="M15.4 10 h8" stroke-dasharray="3 3"/>
        <circle cx="26" cy="10" r="3.4" class="mk-active"/>
        <path d="M29.4 10 h8" stroke-dasharray="3 3"/>
        <circle cx="38" cy="10" r="2.2" class="mk-dim"/>
      </svg>
      <div class="brand-text">
        <h1>نقشه‌راه</h1>
        <p>آرشیو تعاملی پروژه ناوبری خودکار روتر</p>
      </div>
    </div>

    <div class="topbar-actions">
      <button id="openNewTab" class="ghost-btn" disabled>
        <svg viewBox="0 0 24 24"><path d="M14 4h6v6M20 4l-9 9M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-4"/></svg>
        <span>برگهٔ جدید</span>
      </button>
      <button id="fullscreenBtn" class="ghost-btn" disabled>
        <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        <span>تمام‌صفحه</span>
      </button>
    </div>
  </header>

  <div id="body-row">

    <div id="scrim" tabindex="-1"></div>

    <nav id="sidebar" aria-label="فهرست اسناد تعاملی">
      <div id="waypoint-scroll">
        <div id="waypoint-list"><!-- populated by app.js --></div>
      </div>
      <div class="sidebar-foot">
        <span id="itemCount"></span>
      </div>
    </nav>

    <main id="viewer-pane">
      <div id="empty-state">
        <svg viewBox="0 0 120 80" class="empty-route" aria-hidden="true">
          <path d="M8 62 C 28 62, 28 34, 48 34 S 68 8, 88 8 S 108 8, 112 8" stroke-dasharray="4 6"/>
          <circle cx="8" cy="62" r="4"/>
          <circle cx="48" cy="34" r="3.2"/>
          <circle cx="88" cy="8" r="3.2"/>
          <path d="M104 3 l8 5 -8 5 z" class="empty-arrow"/>
        </svg>
        <h2>یک توقف را از مسیر انتخاب کنید</h2>
        <p>هر مورد در فهرست کنار صفحه، یکی از زیرسیستم‌های تعاملی پایان‌نامه را باز می‌کند.</p>
      </div>
      <iframe id="viewer" title="نمایشگر سند تعاملی" hidden></iframe>
    </main>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
